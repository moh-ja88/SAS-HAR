# Default configuration for SAS-HAR experiments
# Use Hydra/OmegaConf style configuration

defaults:
  - _self_
  - model: sas_har
  - dataset: uci_har
  - training: default

# Experiment settings
experiment:
  name: "sas_har_default"
  seed: 42
  device: "cuda"
  debug: false

# Model configuration
model:
  name: "sas_har"
  input_channels: 6
  num_classes: 6
  hidden_dim: 256
  num_heads: 4
  num_transformer_layers: 3
  use_transition_module: true
  dropout: 0.1

# Dataset configuration
dataset:
  name: "uci_har"
  root: "data/uci_har"
  window_size: 128
  stride: 64
  use_norm: true
  download: false

# Data loader configuration
dataloader:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  drop_last: false

# Training configuration
training:
  epochs: 100
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 0.01
  scheduler: "cosine"
  warmup_epochs: 5
  gradient_clip: 1.0
  early_stopping: 10

# Loss configuration
loss:
  boundary_weight: 1.0
  classification_weight: 1.0
  consistency_weight: 0.2
  focal_gamma: 2.0

# Evaluation configuration
evaluation:
  metrics:
    - "accuracy"
    - "macro_f1"
    - "weighted_f1"
    - "boundary_f1"
    - "segment_iou"
  eval_freq: 5  # Evaluate every N epochs

# Logging configuration
logging:
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  save_freq: 10
  tensorboard: true
  wandb: false
  wandb_project: "sas-har"

# Edge deployment configuration (optional)
edge:
  enabled: false
  target_params: 25000
  target_latency_ms: 5.0
  target_energy_nj: 45
  quantize: true
