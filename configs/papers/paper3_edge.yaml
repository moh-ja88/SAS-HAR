# Paper 3: Efficient Edge AI Framework for Real-Time HAR
# Target Venue: MLSys / tinyML Research Symposium

paper:
  title: "EdgeSAS: Efficient Attention-Based Activity Segmentation for Nanojoule-Level HAR"
  short_title: "EdgeSAS: Efficient Edge HAR"
  target_venue: "MLSys"
  impact_factor: 6.0
  expected_submission: "Q2 2027"

abstract: |
  Deploying Human Activity Recognition (HAR) on resource-constrained wearable 
  devices requires models that are both accurate and energy-efficient. We present 
  EdgeSAS, a comprehensive framework for deploying attention-based activity 
  segmentation on microcontrollers with strict memory and energy constraints. 
  EdgeSAS combines knowledge distillation, quantization-aware training, and 
  efficient attention mechanisms to achieve state-of-the-art performance within 
  a 25K parameter budget. Our compressed model achieves 94.2% accuracy on 
  UCI-HAR while consuming only 38 nJ per inference on an STM32F4 microcontroller, 
  with 2.4ms latency and 18KB peak memory usage. We provide comprehensive 
  benchmarks across three hardware platforms (ARM Cortex-M4, nRF52840, ESP32) 
  and release full deployment tooling including ONNX export, TFLite conversion, 
  and energy profiling scripts.

keywords:
  - "Edge AI"
  - "TinyML"
  - "Human Activity Recognition"
  - "Model Compression"
  - "Knowledge Distillation"

contributions:
  - number: 1
    text: |
      EdgeSAS, a compressed variant of SAS-HAR achieving <25K parameters 
      while maintaining >94% accuracy through knowledge distillation.
  
  - number: 2
    text: |
      A quantization-aware training pipeline that reduces INT8 accuracy loss 
      to <1% compared to FP32, with detailed ablation of quantization strategies.
  
  - number: 3
    text: |
      Comprehensive deployment benchmarks on three microcontroller platforms, 
      including energy measurement, latency profiling, and memory analysis.

experiments:
  # Experiment 1: Model Compression
  compression_study:
    teacher_params: 1400000
    student_target: 25000
    techniques:
      - "Knowledge Distillation"
      - "Pruning"
      - "Quantization (INT8)"
    primary_metric: "accuracy_retention"
    target: ">94%"
  
  # Experiment 2: Hardware Benchmarks
  hardware_benchmarks:
    platforms:
      - name: "STM32F4 Discovery"
        cpu: "Cortex-M4"
        clock: "168 MHz"
        memory: "192KB"
      - name: "Arduino Nano 33 BLE"
        cpu: "nRF52840"
        clock: "64 MHz"
        memory: "256KB"
      - name: "ESP32"
        cpu: "Xtensa LX6"
        clock: "240 MHz"
        memory: "520KB"
    metrics:
      - "latency_ms"
      - "energy_nJ"
      - "peak_memory_kb"
      - "model_size_kb"
  
  # Experiment 3: Accuracy vs Efficiency Trade-off
  accuracy_efficiency_tradeoff:
    configurations:
      - "Full SAS-HAR (1.4M params)"
      - "Distilled (500K params)"
      - "Distilled + Pruned (100K params)"
      - "EdgeSAS (25K params)"
      - "EdgeSAS + INT8 (25K params)"
  
  # Experiment 4: Comparison with SOTA Edge HAR
  sota_comparison:
    baselines:
      - "TinierHAR (2024) - 34K params"
      - "MCUNet-HAR"
      - "TinyML-HAR"
    comparison_metrics:
      - "Accuracy"
      - "Parameters"
      - "Latency"
      - "Energy"

expected_results:
  model_compression:
    teacher:
      params: 1400000
      accuracy: 0.972
    student:
      params: 25000
      accuracy: 0.942
      compression_ratio: "56x"
  
  hardware_results:
    stm32f4:
      latency_ms: 2.8
      energy_nJ: 38
      peak_memory_kb: 18
      model_size_kb: 98
    arduino_nano:
      latency_ms: 4.2
      energy_nJ: 52
      peak_memory_kb: 18
      model_size_kb: 98
    esp32:
      latency_ms: 1.5
      energy_nJ: 65
      peak_memory_kb: 18
      model_size_kb: 98
  
  quantization:
    fp32_accuracy: 0.942
    int8_accuracy: 0.935
    accuracy_loss: "0.7%"

